<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Money Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --expense: #ef4444;
            --income: #10b981;
            --borrowed: #f59e0b;
            --lent: #8b5cf6;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px 15px;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 80px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h2 {
            color: var(--text-main);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card.hero {
            grid-column: span 2;
            text-align: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 25px 20px;
        }

        .card.hero h3 { color: #cbd5e1; margin-bottom: 5px; }
        .card.hero p { color: white; font-size: 36px; }

        .card h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .card p {
            font-size: 18px;
            font-weight: 700;
        }

        .card small {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .c-income { color: var(--income); }
        .c-expense { color: var(--expense); }
        .c-borrowed { color: var(--borrowed); }
        .c-lent { color: var(--lent); }

        /* Forms & Containers */
        .section-title {
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            margin-bottom: 25px;
        }

        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .config-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .config-field label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover { background-color: var(--primary-hover); }

        .btn-danger {
            background-color: transparent;
            color: var(--expense);
            border: 1px solid var(--expense);
            margin-top: 20px;
        }

        .btn-danger:hover {
            background-color: var(--expense);
            color: white;
        }

        /* History List */
        .history {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .transaction {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .transaction:last-child { border-bottom: none; padding-bottom: 0; }

        .t-left { display: flex; gap: 12px; align-items: center; }
        .t-badge { width: 6px; height: 36px; border-radius: 3px; }

        .bg-expense { background-color: var(--expense); }
        .bg-income { background-color: var(--income); }
        .bg-borrowed { background-color: var(--borrowed); }
        .bg-lent { background-color: var(--lent); }

        .t-info { display: flex; flex-direction: column; gap: 2px; }
        .t-desc { font-weight: 600; color: var(--text-main); font-size: 14px; }
        .t-date { font-size: 11px; color: var(--text-muted); }

        .t-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .t-amount { font-weight: 700; font-size: 15px; }

        .delete-btn {
            background: #fef2f2;
            color: var(--expense);
            border: none;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            width: auto;
            margin: 0;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <h2>My Money Manager</h2>
    </header>

    <!-- Dashboard -->
    <div class="dashboard">
        <div class="card hero">
            <h3>Available Balance</h3>
            <p id="available-balance">₹0</p>
        </div>
        <div class="card">
            <h3>Total Income</h3>
            <p class="c-income" id="total-income">₹0</p>
        </div>
        <div class="card">
            <h3>Total Expenses</h3>
            <p class="c-expense" id="total-expenses">₹0</p>
        </div>
        <div class="card">
            <h3>Expense Limit</h3>
            <p id="limit-display">₹0</p>
            <small id="limit-status">No limit set</small>
        </div>
        <div class="card">
            <h3>Savings Goal</h3>
            <p id="savings-display">₹0</p>
            <small id="savings-status">No goal set</small>
        </div>
        <div class="card">
            <h3>Borrowed (I Owe)</h3>
            <p class="c-borrowed" id="total-borrowed">₹0</p>
        </div>
        <div class="card">
            <h3>Lent (Owed to Me)</h3>
            <p class="c-lent" id="total-lent">₹0</p>
        </div>
    </div>

    <!-- Configuration Panel -->
    <div class="form-section">
        <h3 class="section-title">Targets & Settings</h3>
        <div class="config-row">
            <div class="config-field">
                <label for="budget-input">Base Budget</label>
                <input type="number" id="budget-input" placeholder="₹">
            </div>
            <div class="config-field">
                <label for="limit-input">Expense Limit</label>
                <input type="number" id="limit-input" placeholder="₹">
            </div>
            <div class="config-field">
                <label for="savings-input">Savings Goal</label>
                <input type="number" id="savings-input" placeholder="₹">
            </div>
        </div>
        <button onclick="saveConfigurations()">Save Targets</button>
    </div>

    <!-- Add Transaction Form -->
    <div class="form-section">
        <h3 class="section-title">New Transaction</h3>
        <input type="text" id="desc" placeholder="What was this for? (e.g., Client, Groceries)">
        <div class="input-group">
            <input type="number" id="amount" placeholder="Amount (₹)">
            <input type="date" id="t-date">
        </div>
        <select id="type">
            <option value="expense">Expense (Money Spent)</option>
            <option value="income">Income (Received Money / Salary)</option>
            <option value="borrowed">Borrowed (Received a loan)</option>
            <option value="lent">Lent (Gave a loan)</option>
        </select>
        <button onclick="addTransaction()">Add Transaction</button>
    </div>

    <!-- Transaction History -->
    <div class="history">
        <h3 class="section-title">Recent History</h3>
        <div id="transaction-list">
            <!-- Transactions injected here via JS -->
        </div>
    </div>

    <!-- Danger Zone -->
    <button class="btn-danger" onclick="clearAllData()">Clear All Data (Start Fresh)</button>

    <script>
        // 1. Initialize data from LocalStorage
        let budget = parseFloat(localStorage.getItem('myBudget')) || 0;
        let expenseLimit = parseFloat(localStorage.getItem('myExpenseLimit')) || 0;
        let savingsGoal = parseFloat(localStorage.getItem('mySavingsGoal')) || 0;
        let transactions = JSON.parse(localStorage.getItem('myTransactions')) || [];

        // Pre-fill setup inputs with current data if it exists
        if(budget) document.getElementById('budget-input').value = budget;
        if(expenseLimit) document.getElementById('limit-input').value = expenseLimit;
        if(savingsGoal) document.getElementById('savings-input').value = savingsGoal;
        
        document.getElementById('t-date').valueAsDate = new Date();

        function formatMoney(amount) {
            return '₹' + amount.toLocaleString('en-IN');
        }

        // Global trackers for validation calculations
        let dynamicTotalExpenses = 0;

        // 2. Update the UI
        function updateUI() {
            let totalExpense = 0;
            let totalIncome = 0;
            let totalBorrowed = 0;
            let totalLent = 0;

            const listElement = document.getElementById('transaction-list');
            listElement.innerHTML = '';

            if (transactions.length === 0) {
                listElement.innerHTML = '<p class="empty-state">No transactions yet. Add one above!</p>';
            }

            transactions.forEach((t, index) => {
                let badgeClass, amountColor, typeLabel, sign;

                if (t.type === 'expense') {
                    totalExpense += t.amount;
                    badgeClass = 'bg-expense'; amountColor = 'c-expense'; typeLabel = 'Expense'; sign = '-';
                } else if (t.type === 'income') {
                    totalIncome += t.amount;
                    badgeClass = 'bg-income'; amountColor = 'c-income'; typeLabel = 'Income'; sign = '+';
                } else if (t.type === 'borrowed') {
                    totalBorrowed += t.amount;
                    badgeClass = 'bg-borrowed'; amountColor = 'c-borrowed'; typeLabel = 'Borrowed'; sign = '+';
                } else if (t.type === 'lent') {
                    totalLent += t.amount;
                    badgeClass = 'bg-lent'; amountColor = 'c-lent'; typeLabel = 'Lent'; sign = '-';
                }

                const dateObj = new Date(t.date);
                const dateString = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });

                const div = document.createElement('div');
                div.classList.add('transaction');
                div.innerHTML = `
                    <div class="t-left">
                        <div class="t-badge ${badgeClass}"></div>
                        <div class="t-info">
                            <span class="t-desc">${t.desc}</span>
                            <span class="t-date">${typeLabel} • ${dateString}</span>
                        </div>
                    </div>
                    <div class="t-right">
                        <span class="t-amount ${amountColor}">${sign}${formatMoney(t.amount)}</span>
                        <button class="delete-btn" onclick="deleteTransaction(${index})">Remove</button>
                    </div>
                `;
                listElement.appendChild(div);
            });

            dynamicTotalExpenses = totalExpense;

            // Math: Starting Budget + Income + Borrowed - Expenses - Lent
            let availableBalance = budget + totalIncome + totalBorrowed - totalExpense - totalLent;

            // Update basic dashboard numbers
            document.getElementById('total-income').innerText = formatMoney(totalIncome);
            document.getElementById('total-expenses').innerText = formatMoney(totalExpense);
            document.getElementById('total-borrowed').innerText = formatMoney(totalBorrowed);
            document.getElementById('total-lent').innerText = formatMoney(totalLent);
            
            let balanceEl = document.getElementById('available-balance');
            balanceEl.innerText = formatMoney(availableBalance);
            balanceEl.style.color = (availableBalance < 0) ? '#fca5a5' : 'white';

            // Update Expense Limit Module
            document.getElementById('limit-display').innerText = formatMoney(expenseLimit);
            let limitStatusEl = document.getElementById('limit-status');
            if (expenseLimit > 0) {
                let remainingLimit = expenseLimit - totalExpense;
                if (remainingLimit <= 0) {
                    limitStatusEl.innerText = "Limit Maxed Out!";
                    limitStatusEl.style.color = "var(--expense)";
                } else {
                    limitStatusEl.innerText = `${formatMoney(remainingLimit)} left before limit`;
                    limitStatusEl.style.color = "var(--text-muted)";
                }
            } else {
                limitStatusEl.innerText = "No limit restrictions";
                limitStatusEl.style.color = "var(--text-muted)";
            }

            // Update Savings Goal Module
            document.getElementById('savings-display').innerText = formatMoney(savingsGoal);
            let savingsStatusEl = document.getElementById('savings-status');
            if (savingsGoal > 0) {
                // Effective savings: What you possess without debt considerations
                let trueSavings = budget + totalIncome - totalExpense; 
                if (trueSavings >= savingsGoal) {
                    savingsStatusEl.innerText = "Savings Goal Reached! 🎉";
                    savingsStatusEl.style.color = "var(--income)";
                } else {
                    let needed = savingsGoal - trueSavings;
                    savingsStatusEl.innerText = `${formatMoney(needed)} more to reach goal`;
                    savingsStatusEl.style.color = "var(--text-muted)";
                }
            } else {
                savingsStatusEl.innerText = "No active goal";
                savingsStatusEl.style.color = "var(--text-muted)";
            }
            
            // Persistent saving
            localStorage.setItem('myTransactions', JSON.stringify(transactions));
            localStorage.setItem('myBudget', budget);
            localStorage.setItem('myExpenseLimit', expenseLimit);
            localStorage.setItem('mySavingsGoal', savingsGoal);
        }

        // 3. Add transaction with safety checking
        function addTransaction() {
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            const date = document.getElementById('t-date').value;

            if (desc.trim() === '' || isNaN(amount) || amount <= 0 || !date) {
                alert('Please fill out all fields correctly.');
                return;
            }

            // Strict Over-Expense Check
            if (type === 'expense' && expenseLimit > 0) {
                if ((dynamicTotalExpenses + amount) > expenseLimit) {
                    alert(`🚨 TRANSACTION BLOCKED!\n\nAdding this expense (${formatMoney(amount)}) will push your total expenditures to ${formatMoney(dynamicTotalExpenses + amount)}, which violates your strict maximum expense limit of ${formatMoney(expenseLimit)}.`);
                    return;
                }
            }

            const transaction = { desc, amount, type, date, id: Date.now() };
            transactions.unshift(transaction);

            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('t-date').valueAsDate = new Date();

            updateUI();
        }

        // 4. Save Targets Configuration
        function saveConfigurations() {
            const bInput = parseFloat(document.getElementById('budget-input').value);
            const lInput = parseFloat(document.getElementById('limit-input').value);
            const sInput = parseFloat(document.getElementById('savings-input').value);

            budget = (!isNaN(bInput) && bInput >= 0) ? bInput : 0;
            expenseLimit = (!isNaN(lInput) && lInput >= 0) ? lInput : 0;
            savingsGoal = (!isNaN(sInput) && sInput >= 0) ? sInput : 0;

            alert("Targets updated successfully!");
            updateUI();
        }

        // 5. Delete individual transaction
        function deleteTransaction(index) {
            if(confirm("Are you sure you want to delete this transaction?")) {
                transactions.splice(index, 1);
                updateUI();
            }
        }

        // 6. Reset device storage completely
        function clearAllData() {
            if(confirm("WARNING: This will clear all calculations, targets, and history permanently. Continue?")) {
                localStorage.clear();
                transactions = [];
                budget = 0;
                expenseLimit = 0;
                savingsGoal = 0;
                document.getElementById('budget-input').value = '';
                document.getElementById('limit-input').value = '';
                document.getElementById('savings-input').value = '';
                updateUI();
            }
        }

        // Initialization execution
        updateUI();
    </script>
</body>
</html>
